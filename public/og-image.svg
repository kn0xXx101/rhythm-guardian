<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FF8C00"/>
      <stop offset="100%" style="stop-color:#FF4500"/>
    </linearGradient>
    
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00BFFF"/>
      <stop offset="50%" style="stop-color:#1E90FF"/>
      <stop offset="100%" style="stop-color:#0066CC"/>
    </linearGradient>
    
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4500"/>
      <stop offset="50%" style="stop-color:#FF8C00"/>
      <stop offset="100%" style="stop-color:#0066CC"/>
    </linearGradient>
    
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF8C00"/>
      <stop offset="100%" style="stop-color:#00BFFF"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Logo centered -->
  <g transform="translate(500, 165)">
    <!-- Left audio bars -->
    <rect x="30" y="140" width="12" height="30" rx="6" fill="url(#orangeGradient)" opacity="0.8"/>
    <rect x="50" y="120" width="12" height="70" rx="6" fill="url(#orangeGradient)" opacity="0.9"/>
    <rect x="70" y="100" width="12" height="110" rx="6" fill="url(#orangeGradient)"/>
    <rect x="90" y="80" width="12" height="150" rx="6" fill="url(#orangeGradient)"/>
    
    <!-- Shield shape -->
    <path d="M100 20 L140 35 L140 90 C140 130 125 165 100 180 C75 165 60 130 60 90 L60 35 Z" 
          fill="url(#shieldGradient)" 
          stroke="rgba(255,255,255,0.2)" 
          stroke-width="2"/>
    
    <!-- Right audio bars -->
    <rect x="108" y="80" width="12" height="150" rx="6" fill="url(#blueGradient)"/>
    <rect x="128" y="100" width="12" height="110" rx="6" fill="url(#blueGradient)"/>
    <rect x="148" y="120" width="12" height="70" rx="6" fill="url(#blueGradient)" opacity="0.9"/>
    <rect x="168" y="140" width="12" height="30" rx="6" fill="url(#blueGradient)" opacity="0.8"/>
    
    <!-- Inner shield details -->
    <circle cx="100" cy="70" r="18" fill="rgba(255,255,255,0.9)"/>
    <path d="M92 70 L97 75 L108 64" stroke="url(#shieldGradient)" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Mini audio bars inside shield -->
    <rect x="90" y="120" width="3" height="20" rx="1.5" fill="rgba(255,255,255,0.8)"/>
    <rect x="96" y="115" width="3" height="30" rx="1.5" fill="rgba(255,255,255,0.9)"/>
    <rect x="102" y="110" width="3" height="40" rx="1.5" fill="rgba(255,255,255,1)"/>
    <rect x="108" y="115" width="3" height="30" rx="1.5" fill="rgba(255,255,255,0.9)"/>
    <rect x="114" y="120" width="3" height="20" rx="1.5" fill="rgba(255,255,255,0.8)"/>
  </g>
  
  <!-- Text -->
  <text x="600" y="420" text-anchor="middle" fill="url(#textGradient)" font-family="Arial, sans-serif" font-size="48" font-weight="bold">Rhythm Guardian</text>
  <text x="600" y="470" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" opacity="0.8">Connect musicians with hirers - Your musical ecosystem</text>
</svg>